name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

# Environment variables to configure:
#
# Secrets (repo > Settings > Secrets):
#   FIREBASE_SERVICE_ACCOUNT  - Firebase service account JSON key
#   GA4_MEASUREMENT_ID        - Google Analytics 4 Measurement ID (G-XXXXXXXXXX)
#
# Variables (repo > Settings > Variables):
#   FIREBASE_PROJECT_ID       - Firebase project ID
#   DEFAULT_URL               - Fallback redirect destination
#   ROUTES_JSON               - JSON object mapping route keys to URLs, e.g.:
#                               {"default":"https://example.com","menu":"https://example.com/menu"}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject config from environment
        run: |
          # Replace placeholders in index.html
          sed -i "s|__GA4_MEASUREMENT_ID__|${{ secrets.GA4_MEASUREMENT_ID }}|g" public/index.html
          sed -i "s|__DEFAULT_URL__|${{ vars.DEFAULT_URL }}|g" public/index.html
          sed -i "s|__ROUTES_JSON__|${{ vars.ROUTES_JSON }}|g" public/index.html

          # Replace placeholder in .firebaserc
          sed -i "s|__FIREBASE_PROJECT_ID__|${{ vars.FIREBASE_PROJECT_ID }}|g" .firebaserc

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}

      - name: Generate QR code links
        env:
          BASE_URL: "https://${{ vars.FIREBASE_PROJECT_ID }}.web.app"
          ROUTES: ${{ vars.ROUTES_JSON }}
        run: |
          # Write routes to a temp file to avoid shell expansion issues
          echo "$ROUTES" > /tmp/routes.json

          # Generate summary using a standalone Python script
          python3 - "$BASE_URL" /tmp/routes.json "$GITHUB_STEP_SUMMARY" << 'PYEOF'
          import sys, json

          base_url = sys.argv[1]
          routes_file = sys.argv[2]
          summary_file = sys.argv[3]

          with open(routes_file) as f:
              routes = json.load(f)

          lines = []
          lines.append("## Deployment Complete\n")
          lines.append(f"**Live site:** {base_url}\n")
          lines.append("## QR Code Links\n")
          lines.append("Copy any link below into your QR code design app.\n")
          lines.append("| Route | URL |")
          lines.append("|-------|-----|")

          for key in routes:
              if key == "default":
                  url = f"{base_url}/?utm_source=qr&utm_medium=qr&utm_campaign={key}"
              else:
                  url = f"{base_url}/?r={key}&utm_source=qr&utm_medium=qr&utm_campaign={key}"
              lines.append(f"| {key} | `{url}` |")

          lines.append("\n---")
          lines.append("*Each link includes UTM parameters for GA4 campaign tracking.*")

          with open(summary_file, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

  deploy-preview:
    name: Preview (PRs)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject config from environment
        run: |
          sed -i "s|__GA4_MEASUREMENT_ID__|${{ secrets.GA4_MEASUREMENT_ID }}|g" public/index.html
          sed -i "s|__DEFAULT_URL__|${{ vars.DEFAULT_URL }}|g" public/index.html
          sed -i "s|__ROUTES_JSON__|${{ vars.ROUTES_JSON }}|g" public/index.html
          sed -i "s|__FIREBASE_PROJECT_ID__|${{ vars.FIREBASE_PROJECT_ID }}|g" .firebaserc

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ vars.FIREBASE_PROJECT_ID }}
