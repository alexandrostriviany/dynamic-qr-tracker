<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    a { color: #4285f4; }
  </style>

  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=__GA4_MEASUREMENT_ID__"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '__GA4_MEASUREMENT_ID__', { send_page_view: false });
  </script>

  <script>
    // Configuration is injected during deploy via environment variables.
    // See .github/workflows/deploy.yml for details.
    var CONFIG = {
      GA_ID: '__GA4_MEASUREMENT_ID__',
      DEFAULT_URL: '__DEFAULT_URL__',
      ROUTES: __ROUTES_JSON__
    };

    // ========================================================
    // REDIRECT LOGIC - No need to edit below
    // ========================================================
    (function() {
      var params = new URLSearchParams(window.location.search);
      var routeKey = params.get('r') || 'default';
      var destination = CONFIG.ROUTES[routeKey] || CONFIG.DEFAULT_URL;

      // Collect UTM parameters for GA4 event
      var eventParams = {
        route_key: routeKey,
        destination: destination
      };

      // Forward all UTM params to the event
      ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'].forEach(function(key) {
        var val = params.get(key);
        if (val) eventParams[key] = val;
      });

      // Fire GA4 event with callback, then redirect
      function doRedirect() {
        window.location.href = destination;
      }

      // Send page_view + custom qr_scan event, then redirect
      gtag('event', 'page_view', {
        page_title: 'QR Redirect - ' + routeKey,
        page_location: window.location.href
      });

      gtag('event', 'qr_scan', Object.assign({}, eventParams, {
        event_callback: function() {
          doRedirect();
        }
      }));

      // Safety timeout: redirect even if GA4 fails or is blocked
      setTimeout(doRedirect, 1500);
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <p>Redirecting...</p>
    <noscript>
      <p><a href="__DEFAULT_URL__">Click here</a> if you are not redirected.</p>
    </noscript>
  </div>
</body>
</html>
